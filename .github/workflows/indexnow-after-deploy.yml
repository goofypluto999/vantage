name: IndexNow ping (manual / deploy hook)

# Pings IndexNow endpoints (Bing, Yandex) for the Vantage URL set.
# Trigger manually after a content drop, or wire to Vercel deploy webhook
# in the future.

on:
  workflow_dispatch: {}
  schedule:
    # Weekly Monday 03:00 UTC — keep IndexNow aware of any updates
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Ping IndexNow
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
        # Bug fix 2026-05-11: was `npx tsx scripts/indexnow-ping.ts`, but
        # the script is .mjs (plain Node ESM, no TS). Workflow failed
        # daily because the .ts file doesn't exist. Now matches the
        # working invocation in seo-postdeploy.yml + seo-weekly.yml.
        run: node scripts/indexnow-ping.mjs
