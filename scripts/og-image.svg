<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d0b1e"/>
      <stop offset="0.5" stop-color="#1a1635"/>
      <stop offset="1" stop-color="#2d2654"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#7c3aed"/>
      <stop offset="1" stop-color="#4f46e5"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.5">
      <stop offset="0" stop-color="#7c3aed" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.15" cy="0.85" r="0.55">
      <stop offset="0" stop-color="#4f46e5" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- subtle grid -->
  <g opacity="0.06" stroke="#a78bfa" stroke-width="1" fill="none">
    <path d="M0 90 L1200 90 M0 180 L1200 180 M0 270 L1200 270 M0 360 L1200 360 M0 450 L1200 450 M0 540 L1200 540"/>
    <path d="M120 0 L120 630 M240 0 L240 630 M360 0 L360 630 M480 0 L480 630 M600 0 L600 630 M720 0 L720 630 M840 0 L840 630 M960 0 L960 630 M1080 0 L1080 630"/>
  </g>

  <!-- logo + wordmark row -->
  <g transform="translate(80,100)">
    <rect width="80" height="80" rx="18" fill="url(#brand)"/>
    <path d="M22 26 L40 60 L58 26" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="108" y="58" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="44" font-weight="800" fill="#ffffff" letter-spacing="-1.2">AimVantage</text>
  </g>

  <!-- main headline -->
  <text x="80" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="#ffffff" letter-spacing="-2.2">AI job preparation</text>
  <text x="80" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="72" font-weight="800" fill="url(#brand)" letter-spacing="-2.2">in 90 seconds.</text>

  <!-- subhead -->
  <text x="80" y="440" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#bfb9e3" letter-spacing="-0.4">Upload your CV. Paste a job link. Get the full prep pack:</text>
  <text x="80" y="476" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="28" font-weight="500" fill="#bfb9e3" letter-spacing="-0.4">company intel, tailored cover letter, mock interview, fit score.</text>

  <!-- foot bar -->
  <g transform="translate(80,548)">
    <rect width="280" height="44" rx="22" fill="rgba(124,58,237,0.15)" stroke="rgba(167,139,250,0.4)"/>
    <text x="20" y="29" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#a78bfa" letter-spacing="0.2">10 free prep packs · no card</text>
  </g>

  <text x="1120" y="577" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="20" font-weight="600" fill="#8c87b3" letter-spacing="0.4">aimvantage.uk</text>
</svg>
